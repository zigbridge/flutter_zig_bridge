name: flutter_zig_bridge
description: >-
  A Flutter package bridging Dart and Zig via FFI. Automatically compiles Zig
  code during the Flutter build using native_toolchain_zig.
version: 0.1.0
repository: https://github.com/brucearctor/flutter_zig_bridge

environment:
  sdk: ^3.8.0
  flutter: ">=3.38.0"

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  hooks: ^1.0.1
  native_toolchain_zig: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Override required because flutter_test from SDK pins meta 1.17.0
# while native_toolchain_zig requires meta ^1.18.1.
# Safe to override — meta is just annotations with no runtime API changes.
dependency_overrides:
  meta: ^1.18.1

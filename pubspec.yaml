name: flutter_zig_bridge
description: >-
  A Flutter package bridging Dart and Zig via FFI. Automatically compiles Zig
  code during the Flutter build using Dart build hooks.
version: 0.1.1
repository: https://github.com/zigbridge/flutter_zig_bridge
topics:
  - zig
  - ffi
  - interop
  - native-assets

environment:
  sdk: ^3.8.0
  flutter: ">=3.38.0"

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  # Build hook dependencies (used by hook/build.dart)
  code_assets: ^1.0.0
  hooks: ^1.0.1
  logging: ^1.3.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

